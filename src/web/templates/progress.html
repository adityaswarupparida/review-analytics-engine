<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Running Analysis — Review Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f1e; --surface: #111827; --surface2: #1a2236;
      --border: #1f2d45; --accent: #0ea5e9; --accent-dim: #0c4a6e;
      --text: #e2e8f0; --muted: #64748b;
      --mono: 'JetBrains Mono', monospace; --sans: 'Inter', sans-serif; --display: 'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: radial-gradient(circle, #1e3a5a 1px, transparent 1px);
      background-size: 32px 32px; opacity: 0.3; pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(14,165,233,0.07) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    header {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2.5rem; border-bottom: 1px solid var(--border);
      background: rgba(10,15,30,0.85); backdrop-filter: blur(12px);
    }
    .logo { display: flex; align-items: center; gap: 0.6rem; }
    .logo-text { font-family: var(--display); font-size: 1rem; font-weight: 700; letter-spacing: -0.02em; }
    .header-tag {
      font-family: var(--mono); font-size: 0.68rem; color: var(--accent);
      background: var(--accent-dim); border: 1px solid rgba(14,165,233,0.3);
      padding: 0.2rem 0.6rem; border-radius: 4px; letter-spacing: 0.06em;
    }
    header a { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); text-decoration: none; letter-spacing: 0.04em; transition: color 0.15s; }
    header a:hover { color: var(--accent); }

    main { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; padding: 3rem 2rem; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .card-header {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.875rem 1.5rem; border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .traffic-lights { display: flex; gap: 6px; }
    .traffic-lights span { width: 10px; height: 10px; border-radius: 50%; }
    .tl-r { background: #ff5f57; } .tl-y { background: #febc2e; } .tl-g { background: #28c840; }
    .card-header-title { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); letter-spacing: 0.05em; }
    .card-body { padding: 2rem; }

    .card-title { font-family: var(--display); font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .card-sub { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); margin-bottom: 2rem; letter-spacing: 0.04em; }

    .steps { display: flex; flex-direction: column; gap: 0; }
    .step { display: flex; align-items: center; gap: 1rem; padding: 0.875rem 0; position: relative; }
    .step:not(:last-child)::after {
      content: ''; position: absolute; left: 1.1rem; top: calc(50% + 1.125rem);
      width: 2px; height: calc(50% - 0.25rem); background: var(--border);
    }
    .step.done::after { background: #10b981; }

    .icon {
      width: 2.25rem; height: 2.25rem; border-radius: 9999px; display: flex;
      align-items: center; justify-content: center; font-size: 0.9rem;
      flex-shrink: 0; z-index: 1; border: 2px solid var(--border); background: var(--bg);
      font-family: var(--mono); line-height: 1;
    }
    .step.pending .icon { color: #334155; border-color: var(--border); }
    .step.running .icon { color: var(--accent); border-color: var(--accent); animation: pulse 1.5s ease-in-out infinite; }
    .step.done .icon    { color: #10b981; border-color: #10b981; background: #052e16; }
    .step.error .icon   { color: #f87171; border-color: #f87171; background: #2d0a0a; }

    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(14,165,233,0.4); } 50% { box-shadow: 0 0 0 6px rgba(14,165,233,0); } }

    .step-body { flex: 1; }
    .step-label { font-size: 0.875rem; font-weight: 500; }
    .step.pending .step-label { color: #334155; }
    .step.running .step-label { color: var(--text); font-weight: 600; }
    .step.done .step-label    { color: #4ade80; }
    .step.error .step-label   { color: #f87171; }
    .step-msg { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); margin-top: 0.2rem; letter-spacing: 0.03em; }
    .step.error .step-msg { color: #fca5a5; }

    .done-banner {
      display: none; margin-top: 2rem; padding: 1.25rem;
      background: #052e16; border: 1px solid #166534; border-radius: 8px; text-align: center;
    }
    .done-banner p { color: #4ade80; font-size: 0.9rem; margin-bottom: 0.75rem; }
    .btn-primary {
      display: inline-block; padding: 0.7rem 1.75rem;
      background: var(--accent); color: #fff;
      text-decoration: none; border-radius: 7px;
      font-family: var(--display); font-size: 0.9rem; font-weight: 700;
      transition: all 0.15s;
    }
    .btn-primary:hover { background: #0284c7; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(14,165,233,0.25); }

    .error-banner {
      display: none; margin-top: 2rem; padding: 1.25rem;
      background: #2d0a0a; border: 1px solid #7f1d1d; border-radius: 8px;
    }
    .error-title { color: #fca5a5; font-size: 0.95rem; font-weight: 600; margin-bottom: 0.4rem; }
    .error-detail { color: #fca5a5; font-size: 0.82rem; opacity: 0.8; margin-bottom: 0.3rem; }
    .error-action { color: #fde68a; font-family: var(--mono); font-size: 0.75rem; margin-bottom: 1rem; }
    .error-raw { font-family: var(--mono); font-size: 0.7rem; color: #7f1d1d; background: #1a0505; padding: 0.5rem 0.75rem; border-radius: 6px; margin-bottom: 1rem; word-break: break-all; }
    .btn-secondary {
      display: inline-block; padding: 0.625rem 1.5rem;
      background: var(--surface2); color: var(--text);
      text-decoration: none; border-radius: 7px; font-size: 0.875rem; font-weight: 600;
      border: 1px solid var(--border); margin-right: 0.5rem; transition: border-color 0.15s;
    }
    .btn-secondary:hover { border-color: #475569; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    .card { animation: fadeUp 0.4s ease both; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <span style="font-size:1.1rem">📊</span>
      <span class="logo-text">Review Analytics</span>
    </div>
    <a href="/">← back to home</a>
  </header>
  <main>
    <div class="card">
      <div class="card-header">
        <div class="traffic-lights">
          <span class="tl-r"></span><span class="tl-y"></span><span class="tl-g"></span>
        </div>
        <span class="card-header-title">pipeline.run</span>
      </div>
      <div class="card-body">
      <div class="card-title">Running Analysis</div>
      <div class="card-sub" id="subtitle">// starting pipeline...</div>

      <div class="steps" id="steps">
        <!-- Injected by JS -->
      </div>

      <div class="done-banner" id="doneBanner">
        <p>✅ Analysis complete! Your dashboard is ready.</p>
        <a class="btn-primary" id="dashboardLink" href="#">View Dashboard →</a>
      </div>

      <div class="error-banner" id="errorBanner">
        <div class="error-title" id="errorTitle">Something went wrong</div>
        <div class="error-detail" id="errorDetail"></div>
        <div class="error-action" id="errorAction"></div>
        <div class="error-raw" id="errorRaw"></div>
        <a class="btn-secondary" id="retryBtn" href="/">← Start Over</a>
      </div>
      </div><!-- card-body -->
    </div>
  </main>

<script>
const STEPS = [
  { step: 'discover',  label: 'Fetching Category & Discovering Competitors' },
  { step: 'scrape',    label: 'Scraping Reviews' },
  { step: 'analyze',   label: 'Analysing Reviews' },
  { step: 'aggregate', label: 'Aggregating Criteria' },
  { step: 'complete',  label: 'Preparing Analytics' },
];

const icons = {
  pending: '○',
  running: '◌',
  done:    '✓',
  error:   '✕',
};

const state = {};
STEPS.forEach(s => state[s.step] = { status: 'pending', message: '' });

function renderSteps() {
  document.getElementById('steps').innerHTML = STEPS.map(s => {
    const st = state[s.step];
    return `
      <div class="step ${st.status}" id="step-${s.step}">
        <div class="icon">${icons[st.status]}</div>
        <div class="step-body">
          <div class="step-label">${s.label}</div>
          ${st.message ? `<div class="step-msg">${st.message}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

const params = new URLSearchParams(location.search);
const jobId = params.get('jobId');
let runId = null;

renderSteps();

const evtSource = new EventSource(`/api/job/${jobId}/stream`);

evtSource.onmessage = (e) => {
  const ev = JSON.parse(e.data);

  if (ev.runId) runId = ev.runId;

  if (state[ev.step]) {
    state[ev.step].status = ev.status;
    state[ev.step].message = ev.message ?? '';
  }

  renderSteps();

  // Update subtitle
  if (ev.status === 'running') {
    document.getElementById('subtitle').textContent = '// ' + (ev.message ?? 'Processing...');
  }

  // Done
  if (ev.step === 'complete' && ev.status === 'done') {
    evtSource.close();
    document.getElementById('subtitle').textContent = 'All done!';
    const link = runId ? `/dashboard?run=${runId}` : '/dashboard';
    document.getElementById('dashboardLink').href = link;
    document.getElementById('doneBanner').style.display = 'block';
  }

  // Error
  if (ev.status === 'error') {
    evtSource.close();
    document.getElementById('subtitle').textContent = 'Analysis failed';
    showError(ev.step, ev.message);
  }
};

evtSource.onerror = () => {
  evtSource.close();
  document.getElementById('subtitle').textContent = 'Connection lost';
  showError('connection', 'Lost connection to server.');
};

const ERROR_MESSAGES = {
  discover: {
    title: 'Failed to discover competitors',
    detail: 'Could not fetch product data from Amazon. This may be a temporary issue with the data service.',
    action: '💡 Check that the ASIN is valid and available on Amazon.in, then try again.',
  },
  scrape: {
    title: 'Failed to scrape reviews',
    detail: 'Could not load Amazon review pages. Your session may have expired.',
    action: '💡 Run the login script again to refresh your Amazon session cookies.',
  },
  analyze: {
    title: 'Failed to analyse reviews',
    detail: 'The AI analysis service encountered an error.',
    action: '💡 Check your Claude API key is valid and has available credits.',
  },
  aggregate: {
    title: 'Failed to aggregate criteria',
    detail: 'An internal error occurred while processing the analysis results.',
    action: '💡 Try running the analysis again — this is usually a transient error.',
  },
  connection: {
    title: 'Connection lost',
    detail: 'The browser lost connection to the server mid-run.',
    action: '💡 The job may still be running in the background. Check Past Runs on the home page.',
  },
};

function showError(step, rawMessage) {
  const info = ERROR_MESSAGES[step] || {
    title: 'Something went wrong',
    detail: 'An unexpected error occurred during the analysis.',
    action: '💡 Please try again. If the problem persists, check the server logs.',
  };

  document.getElementById('errorTitle').textContent = info.title;
  document.getElementById('errorDetail').textContent = info.detail;
  document.getElementById('errorAction').textContent = info.action;

  if (rawMessage) {
    document.getElementById('errorRaw').textContent = `Technical detail: ${rawMessage}`;
    document.getElementById('errorRaw').style.display = 'block';
  }

  document.getElementById('errorBanner').style.display = 'block';
}
</script>
</body>
</html>
