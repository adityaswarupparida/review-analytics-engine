<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Review Analytics</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    header { background: #1e293b; border-bottom: 1px solid #334155; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.25rem; font-weight: 700; }
    header span { font-size: 0.8rem; color: #64748b; }
    main { max-width: 800px; margin: 0 auto; padding: 3rem 2rem; }

    .hero { text-align: center; margin-bottom: 3rem; }
    .hero h2 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.75rem; }
    .hero p { color: #94a3b8; font-size: 1rem; }

    .card { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; padding: 2rem; margin-bottom: 2rem; }
    .card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 1.25rem; color: #e2e8f0; }

    .form-row { display: flex; gap: 0.75rem; }
    input[type="text"] {
      flex: 1; padding: 0.625rem 1rem; background: #0f172a; border: 1px solid #334155;
      border-radius: 0.5rem; color: #e2e8f0; font-size: 0.9rem; outline: none;
    }
    input[type="text"]:focus { border-color: #0ea5e9; }
    input[type="text"]::placeholder { color: #475569; }

    select {
      padding: 0.625rem 1rem; background: #0f172a; border: 1px solid #334155;
      border-radius: 0.5rem; color: #e2e8f0; font-size: 0.9rem; outline: none;
    }
    select:focus { border-color: #0ea5e9; }

    .btn-primary {
      padding: 0.625rem 1.5rem; background: #0ea5e9; color: #fff; border: none;
      border-radius: 0.5rem; font-size: 0.9rem; font-weight: 600; cursor: pointer;
      white-space: nowrap;
    }
    .btn-primary:hover { background: #0284c7; }
    .btn-primary:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    .error { color: #f87171; font-size: 0.85rem; margin-top: 0.5rem; display: none; }

    /* Past runs */
    .runs-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .run-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.875rem 1rem; background: #0f172a; border: 1px solid #334155;
      border-radius: 0.5rem; text-decoration: none; color: #e2e8f0;
      transition: border-color 0.15s;
    }
    .run-item:hover { border-color: #0ea5e9; }
    .run-meta { display: flex; flex-direction: column; gap: 0.2rem; }
    .run-asin { font-weight: 600; font-size: 0.9rem; }
    .run-date { font-size: 0.75rem; color: #64748b; }
    .run-status { font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 9999px; font-weight: 600; }
    .status-complete { background: #064e3b; color: #6ee7b7; }
    .status-running  { background: #1e3a5f; color: #93c5fd; }
    .status-error    { background: #450a0a; color: #fca5a5; }
    .empty { color: #475569; text-align: center; padding: 2rem; font-size: 0.9rem; }
    .arrow { color: #64748b; font-size: 1rem; }
  </style>
</head>
<body>
  <header>
    <h1>📊 Review Analytics</h1>
    <span>Amazon Product Intelligence</span>
  </header>
  <main>
    <div class="hero">
      <h2>Analyse Your Amazon Listing</h2>
      <p>Discover competitors, scrape reviews and get AI-powered purchase criteria insights</p>
    </div>

    <!-- New Analysis -->
    <div class="card">
      <h3>🚀 Start New Analysis</h3>
      <div class="form-row">
        <input type="text" id="asin" placeholder="Enter ASIN (e.g. B0DCZ9PRCP)" maxlength="10"/>
        <select id="category">
          <option value="electronics">Electronics</option>
          <option value="home_kitchen">Home & Kitchen</option>
          <option value="sports_outdoors">Sports & Outdoors</option>
          <option value="tools_home_improvement">Tools & Home Improvement</option>
          <option value="toys_games">Toys & Games</option>
          <option value="beauty_personal_care">Beauty & Personal Care</option>
          <option value="health_household">Health & Household</option>
          <option value="clothing_shoes">Clothing & Shoes</option>
          <option value="office_products">Office Products</option>
          <option value="pet_supplies">Pet Supplies</option>
        </select>
        <button class="btn-primary" id="startBtn" onclick="startAnalysis()">Analyse</button>
      </div>
      <div class="error" id="err"></div>
    </div>

    <!-- Past Runs -->
    <div class="card">
      <h3>📁 Past Runs</h3>
      <div id="runsList" class="runs-list">
        <div class="empty">Loading...</div>
      </div>
    </div>
  </main>

<script>
async function loadRuns() {
  const res = await fetch('/api/runs');
  const { runs } = await res.json();
  const el = document.getElementById('runsList');

  if (!runs.length) {
    el.innerHTML = '<div class="empty">No past runs yet. Start your first analysis above.</div>';
    return;
  }

  el.innerHTML = runs.map(r => `
    <a class="run-item" href="/dashboard?run=${r.id}">
      <div class="run-meta">
        <span class="run-asin">${r.targetAsin}</span>
        <span class="run-date">${new Date(r.createdAt).toLocaleString()} · ${r.category}</span>
      </div>
      <div style="display:flex;align-items:center;gap:0.75rem">
        <span class="run-status status-${r.status === 'complete' ? 'complete' : r.status === 'error' ? 'error' : 'running'}">
          ${r.status}
        </span>
        <span class="arrow">→</span>
      </div>
    </a>
  `).join('');
}

async function startAnalysis() {
  const asin = document.getElementById('asin').value.trim().toUpperCase();
  const category = document.getElementById('category').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('startBtn');

  err.style.display = 'none';

  if (!asin || asin.length !== 10) {
    err.textContent = 'Please enter a valid 10-character ASIN';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Starting...';

  const res = await fetch('/api/run', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ asin, category }),
  });

  const data = await res.json();

  if (!res.ok) {
    err.textContent = data.error ?? 'Failed to start analysis';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Analyse';
    return;
  }

  window.location.href = `/progress?jobId=${data.jobId}`;
}

document.getElementById('asin').addEventListener('keydown', e => {
  if (e.key === 'Enter') startAnalysis();
});

loadRuns();
</script>
</body>
</html>
